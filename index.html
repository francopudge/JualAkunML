<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kstore - Akun Starter ML</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #0f172a; 
            color: #f8fafc;
            /* Memberi ruang agar konten tidak tertutup header/footer */
            padding-top: 70px;
            padding-bottom: 60px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* HEADER & FOOTER FULL WIDTH */
        .sticky-box {
            position: fixed;
            left: 0;
            width: 100%;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            z-index: 1000;
            display: flex;
            align-items: center;
            padding: 0 15px;
        }

        .header { 
            top: 0; 
            height: 70px; 
            border-bottom: 2px solid #3b82f6;
            justify-content: space-between;
        }

        .footer { 
            bottom: 0; 
            height: 60px;
            border-top: 1px solid #334155; 
            justify-content: center;
            font-size: 0.85rem;
            color: #94a3b8;
        }

        .logo-text { font-size: 1.4rem; font-weight: 900; color: #3b82f6; letter-spacing: 1px; }

        #music-btn {
            background: #3b82f6;
            border: none;
            color: white;
            padding: 8px 15px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 0.8rem;
        }

        /* MAIN AREA FULL SCREEN */
        .container {
            flex: 1;
            width: 100%;
            max-width: 500px; /* Batas lebar maksimal agar tidak aneh di tablet */
            margin: 0 auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center; /* Konten di tengah secara vertikal */
        }

        .hero {
            text-align: center;
            margin-bottom: 20px;
        }

        .hero h1 { 
            font-size: 2.2rem;
            font-weight: 900;
            line-height: 1.1;
            margin-bottom: 5px;
            background: linear-gradient(to right, #3b82f6, #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* CARD STYLE */
        .card {
            background: #1e293b;
            width: 100%;
            border-radius: 24px;
            padding: 30px 20px;
            text-align: center;
            border: 1px solid #334155;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
        }

        .price-tag {
            font-size: 4.5rem;
            font-weight: 900;
            color: #10b981;
            margin: 5px 0;
            line-height: 1;
        }

        .badge {
            background: #ef4444;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 800;
            display: inline-block;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .features {
            list-style: none;
            text-align: left;
            margin: 25px 0;
        }

        .features li {
            font-size: 1.1rem;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* BUTTON ACTION */
        .btn-buy {
            background: #2563eb;
            color: white;
            width: 100%;
            padding: 18px;
            border-radius: 16px;
            font-size: 1.3rem;
            font-weight: 800;
            border: none;
            box-shadow: 0 6px 0 #1d4ed8;
            cursor: pointer;
            transition: all 0.1s;
        }

        .btn-buy:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #1d4ed8;
        }

        /* LOADER FULL SCREEN */
        #loader {
            position: fixed;
            inset: 0;
            background: #0f172a;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .progress-text { font-size: 4rem; font-weight: 900; color: #3b82f6; }
        
        /* Animasi sederhana */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .card { animation: fadeIn 0.6s ease-out; }
    </style>
</head>
<body>

    <div id="loader">
        <div class="progress-text">0%</div>
        <p style="letter-spacing: 3px; font-weight: bold; color: #64748b;">MEMUAT KSTORE</p>
    </div>

    <header class="sticky-box header">
        <div class="logo-text">KSTORE</div>
        <button id="music-btn" onclick="toggleMusic()">🎵 MUSIC</button>
    </header>

    <main class="container">
        <div class="hero">
            <h1>STARTER ML</h1>
            <p style="font-size: 1.1rem; color: #94a3b8;">Akun Fresh, Harga Sadis!</p>
        </div>

        <div class="card">
            <span class="badge">STOK TERBATAS</span>
            <div class="price-tag">15K</div>
            <div style="margin-bottom: 20px;">
                <p style="background:#334155; display:inline-block; padding:5px 15px; border-radius:8px; font-size: 0.9rem; font-weight: 600;">DANA / QRIS / CASH</p>
            </div>
            
            <ul class="features">
                <li>✅ 1 Skin Pilihan + Hero</li>
                <li>✅ Win Rate GG (Fresh)</li>
                <li>✅ Full Aman 100%</li>
                <li>✅ Proses Kilat (5 Menit)</li>
            </ul>

            <button class="btn-buy" onclick="kirimPesan()">BELI SEKARANG</button>
        </div>
    </main>

    <footer class="sticky-box footer">
        <p>&copy; 2026 Kstore - Aman & Terpercaya</p>
    </footer>

    <script>
        // Loader Logic
        window.addEventListener('load', () => {
            let p = 0;
            let i = setInterval(() => {
                p += Math.floor(Math.random() * 15) + 5;
                if(p >= 100) p = 100;
                document.querySelector('.progress-text').innerText = p + '%';
                if(p >= 100) {
                    clearInterval(i);
                    setTimeout(() => {
                        document.getElementById('loader').style.opacity = '0';
                        setTimeout(() => {
                            document.getElementById('loader').style.display = 'none';
                        }, 300);
                    }, 200);
                }
            }, 40);
        });

        function kirimPesan() {
            const noWA = "6285872027041"; 
            const teks = "GAS MIN! Mau beli Akun Starter ML 15rb.";
            window.open(`https://wa.me/${noWA}?text=${encodeURIComponent(teks)}`, '_blank');
        }

        function toggleMusic() {
            alert("Fitur musik aktif!"); 
        }
    </script>
</body>
</html>
