<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kstore - Akun Starter ML</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #0f172a; 
            color: #f8fafc;
            padding-top: 80px;
            padding-bottom: 80px;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* HEADER & FOOTER FULL WIDTH */
        .sticky-box {
            position: fixed;
            left: 0;
            width: 100%;
            background: rgba(15, 23, 42, 0.98);
            backdrop-filter: blur(10px);
            z-index: 1000;
            display: flex;
            align-items: center;
            padding: 0 20px;
        }

        .header { 
            top: 0; 
            height: 70px; 
            border-bottom: 2px solid #3b82f6;
            justify-content: space-between;
        }

        .footer { 
            bottom: 0; 
            height: 60px;
            border-top: 1px solid #334155; 
            justify-content: center;
            font-size: 0.9rem;
        }

        .logo-text { font-size: 1.5rem; font-weight: 900; color: #3b82f6; }

        #music-btn {
            background: #3b82f6;
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
        }

        /* MAIN AREA FULL SCREEN */
        .container {
            width: 100%; /* Paksa Full Layar */
            padding: 15px;
        }

        .hero {
            text-align: center;
            padding: 20px 0;
        }

        .hero h1 { 
            font-size: 2.5rem; /* Gedein font judul */
            font-weight: 900;
        }

        /* CARD JADI LEBAR BANGET */
        .card {
            background: #1e293b;
            width: 100%; /* Full mengikuti container */
            border-radius: 20px;
            padding: 40px 20px;
            text-align: center;
            border: 1px solid #334155;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .price-tag {
            font-size: 5rem; /* Harga super gede */
            font-weight: 900;
            color: #10b981;
            margin: 10px 0;
        }

        .badge {
            background: #ef4444;
            padding: 5px 15px;
            border-radius: 5px;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 10px;
        }

        .features {
            list-style: none;
            text-align: left;
            margin: 30px 0;
        }

        .features li {
            font-size: 1.2rem; /* List diperbesar */
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .btn-buy {
            background: #2563eb;
            color: white;
            width: 100%;
            padding: 20px; /* Tombol tinggi gampang dipencet */
            border-radius: 15px;
            font-size: 1.5rem;
            font-weight: 900;
            border: none;
            box-shadow: 0 8px 0 #1d4ed8; /* Efek tombol 3D */
            cursor: pointer;
        }

        .btn-buy:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 #1d4ed8;
        }

        #loader {
            position: fixed;
            inset: 0;
            background: #0f172a;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .progress-text { font-size: 3rem; font-weight: 900; color: #3b82f6; }
    </style>
</head>
<body>

    <div id="loader">
        <div class="progress-text">0%</div>
        <p>MEMUAT KSTORE...</p>
    </div>

    <header class="sticky-box header">
        <div class="logo-text">KSTORE</div>
        <button id="music-btn" onclick="toggleMusic()">🎵 MUSIC</button>
    </header>

    <main class="container">
        <div class="hero">
            <h1>STARTER ML</h1>
            <p style="font-size: 1.2rem; color: #94a3b8;">Akun Fresh, Harga Sadis!</p>
        </div>

        <div class="card">
            <span class="badge">STOK TERBATAS</span>
            <div class="price-tag">15K</div>
            <p style="background:#334155; display:inline-block; padding:5px 10px; border-radius:5px;">DANA / CASH</p>
            
            <ul class="features">
                <li>✅ 1 Skin Pilihan + Hero</li>
                <li>✅ Win Rate GG (Fresh)</li>
                <li>✅ Full Aman 100%</li>
                <li>✅ Proses Kilat</li>
            </ul>

            <button class="btn-buy" onclick="kirimPesan()">BELI SEKARANG</button>
        </div>
    </main>

    <footer class="sticky-box footer">
        <p>&copy; 2026 Kstore - No Hackback!</p>
    </footer>

    <script>
        // Loader Cepat
        window.addEventListener('load', () => {
            let p = 0;
            let i = setInterval(() => {
                p += 10;
                document.querySelector('.progress-text').innerText = p + '%';
                if(p >= 100) {
                    clearInterval(i);
                    document.getElementById('loader').style.display = 'none';
                }
            }, 50);
        });

        function kirimPesan() {
            const noWA = "6285872027041"; 
            const teks = "GAS MIN! Mau beli Akun Starter ML 15rb.";
            window.open(`https://wa.me/${noWA}?text=${encodeURIComponent(teks)}`, '_blank');
        }

        // Fungsi musik sederhana (sesuaikan source filenya)
        function toggleMusic() {
            alert("Musik diputar!"); // Tambahkan logic audio.play() seperti sebelumnya
        }
    </script>
</body>
</html>
